version: '3.8'

services:
  web:
    build: .
    container_name: cogeneration_app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - PORT=3000
      - NODE_ENV=development
      - MONGODB_URI=mongodb://db:27017/cogeneration_db
      - SESSION_SECRET=super-secret-key-tec
    depends_on:
      - db

  db:
    image: mongo:latest
    container_name: cogeneration_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: